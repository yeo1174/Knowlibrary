<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Library - Content Table</title>
<style>
  :root {
    --primary: #2D6473;
    --accent: #427381;
    --accent-light: #81A2AB;
    --bg: #f5f7f8;
    --card-bg: #ffffff;
    --border: #d0d8dc;
    --text: #1a2a30;
    --text-light: #5a6e78;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 40px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  header {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    padding: 40px 48px;
    border-radius: 12px;
    margin-bottom: 36px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header p {
    margin-top: 8px;
    opacity: 0.85;
    font-size: 15px;
  }
  .stats-row {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .stat {
    background: rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
  }
  .section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-header {
    background: var(--accent);
    color: #fff;
    padding: 14px 24px;
    font-size: 17px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: default;
  }
  .section-header .badge {
    background: rgba(255,255,255,0.2);
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    text-align: left;
    padding: 10px 24px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
    background: #f0f3f5;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  td {
    padding: 10px 24px;
    border-bottom: 1px solid #eef2f4;
    font-size: 14px;
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafb; }
  .doc-name {
    font-weight: 500;
    color: var(--primary);
    white-space: nowrap;
  }
  .doc-sub {
    font-size: 12px;
    color: var(--text-light);
  }
  .trigger {
    display: inline-block;
    background: #e8eef0;
    color: var(--primary);
    padding: 1px 8px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    font-weight: 500;
  }
  .sub-section td:first-child { padding-left: 48px; }
  .sub-section .doc-name { font-size: 13px; }
  footer {
    text-align: center;
    padding: 32px 0 12px;
    color: var(--text-light);
    font-size: 13px;
  }
  @media (max-width: 768px) {
    header { padding: 28px 20px; }
    header h1 { font-size: 22px; }
    td, th { padding: 8px 16px; }
    .sub-section td:first-child { padding-left: 32px; }
    .doc-name { white-space: normal; }
  }
</style>
</head>
<body>
<header>
  <h1>Knowledge Library</h1>
  <p>Architectural & regulatory reference — Malaysian building standards, contracts, circulars, and guidelines</p>
  <div class="stats-row">
    <span class="stat">0 sections</span>
    <span class="stat">0 documents</span>
    <span class="stat">Auto-generated: 2026-07-14</span>
  </div>
</header>

<footer>
  Knowledge Library &mdash; SKY Architects &bull; Generated 2026-07-14
</footer>
</body>
</html>
