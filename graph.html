const W=window.innerWidth,H=window.innerHeight;
const svg=d3.select('svg').attr('width',W).attr('height',H),G=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.15,5]).on('zoom',e=>G.attr('transform',e.transform)));
const dn=ND.filter(n=>!n.isHub),hn=ND.filter(n=>n.isHub);
const rd=d3.scaleSqrt().domain([0,d3.max(dn,n=>n.deg)||1]).range([4,17]);

// Category positions - arrange hubs around a circle
const catPos={};const catNames=[...new Set(dn.map(n=>n.cl))].sort();const cr=Math.min(W,H)*0.28;
catNames.forEach((cl,i)=>{const a=2*Math.PI*i/catNames.length-Math.PI/2;catPos[cl]={x:W/2+cr*Math.cos(a),y:H/2+cr*Math.sin(a)};});

// Assign position to each node based on category, and pin hubs
ND.forEach(n=>{if(n.isHub&&catPos[n.n]){n.fx=catPos[n.n].x;n.fy=catPos[n.n].y;}});

// Prepare edges - convert s/t ids to node references
const edges=ED.map(e=>({source:ND.find(n=>n.id===e.s),target:ND.find(n=>n.id===e.t),w:e.w}));
const sim=d3.forceSimulation(ND)
  .force('link',d3.forceLink(edges).id(n=>n.id).distance(60).strength(n=>n.isHub?0.8:Math.min(n.w||.3,.8)*.03))
  .force('charge',d3.forceManyBody().strength(n=>n.isHub?-150:-40))
  .force('x',d3.forceX(n=>n.isHub?n.fx:(catPos[n.cl]?catPos[n.cl].x:W/2)).strength(n=>n.isHub?1:0.06))
  .force('y',d3.forceY(n=>n.isHub?n.fy:(catPos[n.cl]?catPos[n.cl].y:H/2)).strength(n=>n.isHub?1:0.06))
  .force('collision',d3.forceCollide().radius(n=>n.isHub?24:rd(n.deg||1)+2));

const lnk=G.append('g').selectAll('line').data(edges).join('line').attr('stroke','rgba(255,255,255,.03)').attr('stroke-width',.8);
const nd=G.append('g').selectAll('circle').data(ND).join('circle')
  .attr('r',n=>n.isHub?26:Math.max(rd(n.deg||1),4))
  .attr('fill',n=>n.co||'#666')
  .attr('stroke',n=>n.isHub?'rgba(255,255,255,.3)':'rgba(255,255,255,.06)')
  .attr('stroke-width',n=>n.isHub?2.5:.4)
  .attr('opacity',n=>n.isHub?.6:.85)
  .style('cursor',n=>n.isHub?'default':'grab');
const lb=G.append('g').selectAll('text').data(hn).join('text')
  .text(n=>n.n)
  .attr('text-anchor','middle').attr('dy','.35em')
  .attr('fill','rgba(255,255,255,.7)').attr('font-size',11).attr('font-weight',600).attr('pointer-events','none');

sim.on('tick',()=>{lnk.attr('x1',n=>n.source.x).attr('y1',n=>n.source.y).attr('x2',n=>n.target.x).attr('y2',n=>n.target.y);

// Drag
nd.call(d3.drag().on('start',function(e,n){if(!n.isHub&&!e.active){sim.alphaTarget(.3).restart()}n.fx=n.x;n.fy=n.y;})

// Category chips

  .on('click',function(){d3.select(this).classed('on',!d3.select(this).classed('on'));f();});});
const search=d3.select('#S');search.on('input',f);

function f(){const ac=[...document.querySelectorAll('.cf.on')].map(e=>e.textContent.trim());const q=search.property('value').toLowerCase().trim();const hq=q.length>0;
nd.each(function(n){if(n.isHub){const ok=dn.some(d=>d.cl===n.n&&(ac.length===0||ac.includes(d.cl))&&(!hq||d.n.toLowerCase().includes(q)||(d.su||'').toLowerCase().includes(q)||(d.tg||[]).some(t=>t.includes(q))));
d3.select(this).transition(200).attr('opacity',ok?.3:.04)}else{const cm=ac.length===0||ac.includes(n.cl);const sm=!hq||n.n.toLowerCase().includes(q)||(n.su||'').toLowerCase().includes(q)||(n.tg||[]).some(t=>t.includes(q));
d3.select(this).transition(200).attr('opacity',cm&&sm?.8:.04)}});
lnk.each(function(e){const sn=e.source,tn=e.target;const si=typeof sn==='object'?sn.id:sn,ti=typeof tn==='object'?tn.id:tn;

const tv=TV&&(TV.isHub||((ac.length===0||ac.includes(TV.cl))&&(!hq||TV.n.toLowerCase().includes(q)||(TV.su||'').toLowerCase().includes(q)||(TV.tg||[]).some(t=>t.includes(q)))));
d3.select(this).transition(200).attr('stroke-opacity',sv&&tv?.06:0);});
lb.each(function(n){const ok=dn.some(d=>d.cl===n.n&&(ac.length===0||ac.includes(d.cl))&&(!hq||d.n.toLowerCase().includes(q)||(d.su||'').toLowerCase().includes(q)||(d.tg||[]).some(t=>t.includes(q))));
d3.select(this).transition(200).attr('opacity',ok?.5:0);});}

// Tooltip
let tt=null;const T=d3.select('#T'),TN=T.select('.tn'),TC=T.select('.tc'),TS=T.select('.ts'),TH=T.select('.th');
nd.on('mouseenter',function(e,n){if(n.isHub)return;clearTimeout(tt);tt=setTimeout(()=>{
TN.text(n.n);TC.text(n.cl+(n.sc?' / '+n.sc.replace(/[-_]/g,' '):''));TS.text(n.su||'');TH.text(n.deg+' conn'+(n.deg!==1?'s':''));

}).on('mousemove',function(e){if(T.style('display')==='block')T.style('left',Math.min(e.clientX+14,W-320)+'px').style('top',Math.min(e.clientY+14,H-170)+'px');
}).on('mouseleave',function(){clearTimeout(tt);T.style('display','none');f();})
.on('click',function(e,n){if(n.isHub)return;
const ids=new Set();edges.forEach(e=>{const s=typeof e.source==='object'?e.source.id:e.source;const t=typeof e.target==='object'?e.target.id:e.target;if(s===n.id)ids.add(t);if(t===n.id)ids.add(s);});

lnk.each(function(e){const s=typeof e.source==='object'?e.source.id:e.source;const t=typeof e.target==='object'?e.target.id:e.target;d3.select(this).transition(300).attr('stroke-opacity',s===n.id||t===n.id?.12:.005).attr('stroke-width',s===n.id||t===n.id?1.5:.5);});
TN.text(n.n);TC.text(n.cl+(n.sc?' / '+n.sc.replace(/[-_]/g,' '):''));TS.text(n.su||'');TH.text(n.deg+' conn'+(n.deg!==1?'s':'')+' [click]');
T.style('display','block').style('left',Math.min(e.clientX+14,W-320)+'px').style('top',Math.min(e.clientY+14,H-170)+'px');
T.on('click',function(){T.style('display','none');f();},{once:true});});

// Legend
const LG=d3.select('#L');cats.forEach(cl=>{const c=dn.find(n=>n.cl===cl);LG.append('span').attr('class','li').html('<span class=d style=background:'+(c?c.co:'#666')+'></span>'+cl);});
setTimeout(f,500);
window.addEventListener('resize',()=>{const w=window.innerWidth,h=window.innerHeight;svg.attr('width',w).attr('height',h);sim.force('center',d3.forceCenter(w/2,h/2)).alpha(.3).restart();});
